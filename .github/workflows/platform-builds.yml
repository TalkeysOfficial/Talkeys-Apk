name: Platform Builds

on:
  pull_request:
  push:
    branches:
      - master
      - "kmp/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platform-builds-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build Android app
        run: ./gradlew --no-daemon :app:assembleDebug

  ios-app:
    name: iOS App Build
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build iOS app (includes shared framework)
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build
